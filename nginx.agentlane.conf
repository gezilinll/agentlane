map $http_upgrade $agentlane_connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 50m;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend:4173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $agentlane_connection_upgrade;
  }

  location = /healthz {
    proxy_pass http://backend:4173/healthz;
  }

  location = /readyz {
    proxy_pass http://backend:4173/readyz;
  }
}
