name: lorume

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lorume
      POSTGRES_USER: lorume
      POSTGRES_PASSWORD: lorume
    ports:
      - "54329:5432"
    volumes:
      - lorume-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lorume -d lorume"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  lorume-postgres-data:
