services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lorume
      POSTGRES_USER: lorume
      POSTGRES_PASSWORD: ${LORUME_POSTGRES_PASSWORD:-lorume}
    volumes:
      - lorume-prod-like-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lorume -d lorume"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://lorume:${LORUME_POSTGRES_PASSWORD:-lorume}@postgres:5432/lorume
      LORUME_BACKEND_HOST: 0.0.0.0
      LORUME_BACKEND_PORT: 4173
      LORUME_EMAIL_PROVIDER: ${LORUME_EMAIL_PROVIDER:-}
      LORUME_EMAIL_FROM: ${LORUME_EMAIL_FROM:-}
      LORUME_SMTP_HOST: ${LORUME_SMTP_HOST:-}
      LORUME_SMTP_PASSWORD: ${LORUME_SMTP_PASSWORD:-}
      LORUME_SMTP_PORT: ${LORUME_SMTP_PORT:-}
      LORUME_SMTP_SECURE: ${LORUME_SMTP_SECURE:-}
      LORUME_SMTP_USER: ${LORUME_SMTP_USER:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LORUME_BACKEND_PUBLISH:-4173}:4173"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "${LORUME_FRONTEND_PUBLISH:-8080}:80"

volumes:
  lorume-prod-like-postgres-data:
